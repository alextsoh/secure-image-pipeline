name: Build

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DASHBOARD_URL: https://7083ee5bfd9c8632-94-70-215-151.serveousercontent.com

permissions:
  contents: read
  packages: write   # needed to push to GHCR
  id-token: write   # needed for Cosign keyless signing (OIDC)
  security-events: write

jobs:
  build-sign-attest:
    runs-on: ubuntu-latest

    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # 'digest' output is the immutable reference we sign/scan,
          # not the mutable 'latest' tag
          provenance: false

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      - name: Scan for vulnerabilities (table report)
        uses: anchore/scan-action@v7.4.0
        id: scan
        with:
          sbom: sbom.spdx.json
          fail-build: false
          severity-cutoff: critical
          output-format: table
          output-file: vulnerability-report.txt

      - name: Scan for vulnerabilities (JSON for dashboard)
        uses: anchore/scan-action@v7.4.0
        id: scan-json
        with:
          sbom: sbom.spdx.json
          fail-build: false
          severity-cutoff: critical
          output-format: json
          output-file: vulnerability-report.json

      - name: Upload readable report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: readable-vulnerability-report
          path: vulnerability-report.txt

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        if: always()

      - name: Sign image with Cosign
        id: sign
        if: always()
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Notify dashboard
        if: always()
        env:
          SIGN_OUTCOME: ${{ steps.sign.outcome }}
        run: |
          SBOM_B64=$(base64 -w0 sbom.spdx.json 2>/dev/null || base64 sbom.spdx.json)
          VULN_TXT_B64=$(base64 -w0 vulnerability-report.txt 2>/dev/null || base64 vulnerability-report.txt || echo "")
          VULN_JSON_B64=$(base64 -w0 vulnerability-report.json 2>/dev/null || base64 vulnerability-report.json || echo "")

          SIGNED="false"
          [ "$SIGN_OUTCOME" = "success" ] && SIGNED="true"

          curl -fsSL -X POST "${{ env.DASHBOARD_URL }}/api/webhook" \
            -H "Content-Type: application/json" \
            -d "{
              \"run_id\":              \"${{ github.run_id }}\",
              \"run_url\":             \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"repository\":          \"${{ github.repository }}\",
              \"commit\":              \"${{ github.sha }}\",
              \"branch\":              \"${{ github.ref_name }}\",
              \"image_digest\":        \"${{ steps.build.outputs.digest }}\",
              \"signed\":              ${SIGNED},
              \"sign_status\":         \"${SIGN_OUTCOME}\",
              \"sbom\":                \"${SBOM_B64}\",
              \"vulnerability_report\": \"${VULN_TXT_B64}\",
              \"vulnerability_json\":  \"${VULN_JSON_B64}\"
            }"


  provenance:
    needs: [build-sign-attest]
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ghcr.io/${{ github.repository }}
      digest: ${{ needs.build-sign-attest.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
