name: Build

on:
  push:
    branches: [main]
env:
  DASHBOARD_URL: https://3a9fd0718a865e.lhr.life #url for localhost reverse proxy for demo

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # REQUIRED — git needs full history/tags to describe

      - name: Compute version tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # released: you pushed a git tag like v1.2.3 → use it as-is
            TAG="${{ github.ref_name }}"
          else
            # dev build: nearest vX.Y.Z tag + build number + short sha (always unique)
            BASE=$(git describe --tags --abbrev=0 --match "v[0-9]*.[0-9]*.[0-9]*" 2>/dev/null || echo "v0.0.0")
            TAG="${BASE}-${{ github.run_number }}-g$(git rev-parse --short HEAD)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version tag: $TAG"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest
          provenance: false

      - uses: alextsoh/secure-pipeline-action@290239de7acb3f24225184a1272b867ffc5a462b
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          tags: ${{ steps.version.outputs.tag }}        # ← hand the tag to the action
          dashboard-url: ${{ env.DASHBOARD_URL }}

  provenance:
    needs: [build]
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ghcr.io/${{ github.repository }}
      digest: ${{ needs.build.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}