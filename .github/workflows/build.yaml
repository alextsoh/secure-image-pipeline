name: Build
 
on:
  push:
    branches: [main]
 
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
 
permissions:
  contents: read
  packages: write   # needed to push to GHCR
  id-token: write   # needed for Cosign keyless signing (OIDC)
 
jobs:
  build-sign-attest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
 
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # 'digest' output is the immutable reference we sign/scan,
          # not the mutable 'latest' tag

          provenance: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
 
      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
 
      # --- Step 2: Scan the SBOM with Grype ---
      - name: Scan for vulnerabilities
        uses: anchore/scan-action@v7.4.0
        with:
          sbom: sbom.spdx.json
          fail-build: true        # fails the pipeline on critical findings
          severity-cutoff: critical
          output-format: sarif    
          output-file: results.sarif


      - name: Upload vulnerability report
        uses: github/codeql-action/upload-sarif@v3
        if: always()    
        with:          
          sarif_file: results.sarif